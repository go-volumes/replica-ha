name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  COVERAGE_MIN: "100.0"

jobs:
  native:
    name: native (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build
        run: CGO_ENABLED=0 go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (with coverage gate)
        run: |
          set -euo pipefail
          CGO_ENABLED=0 go test -count=1 -covermode=atomic -coverprofile=cover.out ./...
          total=$(go tool cover -func=cover.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}% (min ${COVERAGE_MIN}%)"
          awk -v c="$total" -v m="$COVERAGE_MIN" 'BEGIN { exit (c+0 >= m+0) ? 0 : 1 }' \
            || { echo "Coverage ${total}% below minimum ${COVERAGE_MIN}%"; exit 1; }

  emulated:
    name: emulated (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: "rv64,v=true,vlen=128"
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: "la464"
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: "power9"
          - arch: s390x
            image: debian:trixie
            qemu_cpu: "qemu"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Set up binfmt (QEMU)
        run: docker run --rm --privileged tonistiigi/binfmt --install all
      - name: Cross-compile per-package test binaries
        run: |
          set -euo pipefail
          mkdir -p testbins
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            echo "Compiling test binary for $pkg"
            CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
              go test -c -covermode=atomic -o "testbins/${name}.test" "$pkg" || {
                # Packages with no test files produce no binary; that is fine.
                echo "no test binary for $pkg (no tests?)"
              }
          done
          ls -l testbins
      - name: Run test binaries under QEMU (${{ matrix.arch }})
        run: |
          set -euo pipefail
          shopt -s nullglob
          for bin in testbins/*.test; do
            echo "::group::Running $bin on linux/${{ matrix.arch }}"
            docker run --rm --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU='${{ matrix.qemu_cpu }}' \
              -v "$PWD":/work -w /work \
              ${{ matrix.image }} \
              "/work/$bin" -test.v
            echo "::endgroup::"
          done
